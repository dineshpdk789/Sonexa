name: sonexa
description: Echo Music Next - A premium Flutter music streaming app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.7

  # Networking
  dio: ^5.4.3+1
  connectivity_plus: ^6.0.3

  # Local Storage
  hive_flutter: ^1.1.0
  path_provider: ^2.1.3

  # Audio
  just_audio: ^0.9.40
  just_audio_background: ^0.0.1-beta.13
  audio_service: ^0.18.14

  # Images
  cached_network_image: ^3.3.1
  flutter_cache_manager: ^3.3.1

  # Permissions
  permission_handler: ^11.3.1

  # Animations & UI
  shimmer: ^3.0.0
  lottie: ^3.1.2

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0
  url_launcher: ^6.3.0

  # Icons & Fonts
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  video_player: ^2.11.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
